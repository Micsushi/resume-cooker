<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume Cooker Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          Segoe UI,
          Arial,
          sans-serif;
      }
      body {
        margin: 0;
        background: #f5f5f2;
        color: #202124;
      }
      header {
        align-items: center;
        background: #ffffff;
        border-bottom: 1px solid #d7d7d0;
        display: flex;
        gap: 12px;
        height: 52px;
        justify-content: space-between;
        padding: 0 16px;
      }
      button {
        background: #202124;
        border: 0;
        border-radius: 6px;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        padding: 8px 12px;
      }
      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }
      main {
        display: grid;
        grid-template-columns: minmax(320px, 0.8fr) minmax(420px, 1.2fr);
        height: calc(100vh - 53px);
      }
      pre {
        background: #ffffff;
        border-right: 1px solid #d7d7d0;
        margin: 0;
        overflow: auto;
        padding: 16px;
        white-space: pre-wrap;
      }
      iframe {
        border: 0;
        height: 100%;
        width: 100%;
      }
      .status {
        font-size: 14px;
      }
      .error {
        color: #a40000;
      }
      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
          grid-template-rows: 38vh 1fr;
        }
        pre {
          border-bottom: 1px solid #d7d7d0;
          border-right: 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <strong>Resume Cooker Preview</strong>
      <span id="status" class="status">Loading...</span>
      <button id="compile">Build Preview</button>
    </header>
    <main>
      <pre id="source"></pre>
      <iframe id="pdf" title="Temporary resume PDF preview"></iframe>
    </main>
    <script>
      const sourceEl = document.querySelector("#source");
      const statusEl = document.querySelector("#status");
      const pdfEl = document.querySelector("#pdf");
      const button = document.querySelector("#compile");
      let lastMtime = 0;

      async function loadSource() {
        const response = await fetch("/api/source");
        const data = await response.json();
        sourceEl.textContent = data.text;
        if (lastMtime && data.mtimeMs !== lastMtime) {
          await compile();
        }
        lastMtime = data.mtimeMs;
      }

      async function compile() {
        button.disabled = true;
        statusEl.textContent = "Building...";
        statusEl.classList.remove("error");
        const response = await fetch("/api/compile", { method: "POST" });
        const data = await response.json();
        statusEl.textContent = data.message;
        statusEl.classList.toggle("error", !data.ok);
        if (data.pdfUrl) {
          pdfEl.src = data.pdfUrl;
        }
        button.disabled = false;
      }

      async function loadStatus() {
        const response = await fetch("/api/status");
        const data = await response.json();
        statusEl.textContent = data.message;
        statusEl.classList.toggle("error", !data.ok);
        if (data.pdfUrl) {
          pdfEl.src = data.pdfUrl;
        }
      }

      button.addEventListener("click", compile);
      await loadSource();
      await loadStatus();
      setInterval(loadSource, 1500);
    </script>
  </body>
</html>
