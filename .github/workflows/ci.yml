name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  root-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lightweight root checks
        run: npm run ci
